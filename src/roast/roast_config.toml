[[personality]]
id = "philosopher"
name = "THE PHILOSOPHER"
mbti = "INTP"
dog_breed = "Border Collie"
dog_image = "dog-philosopher.png"
emoji = "\U0001F914"
card_color = "#E0EFDA"
catchphrase = "This needs more research."
condition = "think_do_ratio > 2.5"
priority = 1

# Radar chart overrides (0-100 scale, optional — if omitted, computed from data)
# Use these to "pull extremes" for personality-specific flavor.
[personality.radar_bias]
yapping = 95
shipping = 10

[[personality.quips]]
template = "{reads}% reading. {writes}% writing. The rest? Existential crisis."
condition = "default"

[[personality.quips]]
template = "Read {top_file} files before writing one line."
condition = "top_file > 50"

[[personality.quips]]
template = "Spent {reads}% of the time thinking. Shipped {writes}%. The math checks out."
condition = "reads > 70"

[[personality.quips]]
template = "{actions} actions. {writes}% were actual output. The rest was preparation."
condition = "actions > 5000"

[[personality.quips]]
template = "Thought about it {top_file} times. Did it once."
condition = "top_file > 30"

[[personality.quips]]
template = "Reads everything. Ships nothing. Survives anyway."
condition = "plot_armor > 85"

[[personality.quips]]
template = "Your AI read more than it wrote by a factor of {read_write_ratio}x."
condition = "read_write_ratio > 5"


