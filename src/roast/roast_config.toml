# PunkGo Roast — Personality Configuration
# ==========================================
# This file is the SINGLE SOURCE OF TRUTH for all personality data.
# To add a new personality: add a [[personality]] block. No Rust code changes needed.
#
# Detection: personalities are evaluated in array order. First match wins.
# Conditions use a simple expression language:
#   - Variables: think_do_ratio, fail_rate, total_events, max_file_read_count,
#     edit_write_ratio, night_ratio, session_starts, session_ends, web_search,
#     cmd_exec_failed, ghost_ratio, subagent_ratio, prompt_ratio, action_ratio,
#     search_ratio, file_dispersion, actions_per_prompt, peak_hour,
#     search_count, subagent_start, user_prompt, file_read, file_write,
#     file_edit, ghost_sessions, peak_rate
#   - Operators: >, <, >=, <=, ==, &&, ||
#   - Examples: "think_do_ratio > 2.5", "fail_rate > 3.0 && total_events > 1000"
#
# Quip selection: quips are evaluated in order. First whose condition matches wins.
# A quip with condition = "default" always matches (use as last fallback).
#
# Template placeholders: {reads}, {writes}, {edits}, {searches}, {fails},
#   {sessions}, {top_file}, {actions}, {night}, {peak_hour}, {search_count},
#   {subagents}, {ghost_sessions}, {prompts}, {read_write_ratio},
#   {edit_write_ratio}, {actions_per_session}, {peak_rate}, {minutes_per_search}

# -- Radar chart dimension definitions --
# Each dimension maps to a computed metric from event data.
# formula: a mini-expression using the same variables as conditions.
# label: display name on the radar chart.

[[radar_dimension]]
key = "yapping"
label = "Yapping"
formula = "read_search_ratio"   # (file_read + content_search + web_search + file_search) / total * 100

[[radar_dimension]]
key = "googling"
label = "Googling"
formula = "web_search_ratio"    # web_search / total * 100

[[radar_dimension]]
key = "grinding"
label = "Grinding"
formula = "session_avg_length"  # average actions per session

[[radar_dimension]]
key = "shipping"
label = "Shipping"
formula = "write_edit_ratio"    # (file_write + file_edit) / total * 100

[[radar_dimension]]
key = "tunnel_vision"
label = "Tunnel Vision"
formula = "file_concentration"  # max_file_read_count / total_file_reads * 100

[[radar_dimension]]
key = "plot_armor"
label = "Plot Armor"
formula = "stability"           # 100 - fail_rate


