<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" font-family="'JetBrains Mono','Fira Code','Cascadia Code',Menlo,monospace" font-size="12.5">
  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3fb950"/>
    </marker>
    <marker id="aa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d29922"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#58a6ff"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="680" height="360" rx="8" fill="#0d1117"/>

  <!-- Terminal dots -->
  <circle cx="20" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="14" r="5" fill="#febc2e"/>
  <circle cx="52" cy="14" r="5" fill="#28c840"/>
  <text x="340" y="18" fill="#3fb950" font-size="11" font-weight="bold" text-anchor="middle">EVERY AI ACTION GETS A RECEIPT</text>

  <!-- ═══ Row 1: AI Tools → Hook → Jack ═══ -->

  <!-- AI Tools box -->
  <rect x="24" y="40" width="120" height="52" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="84" y="60" fill="#58a6ff" font-size="11" font-weight="bold" text-anchor="middle">AI Tools</text>
  <text x="84" y="78" fill="#6e7681" font-size="8" text-anchor="middle">Claude Code · Cursor</text>

  <!-- Arrow: tools → jack -->
  <line x1="144" y1="66" x2="186" y2="66" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="165" y="58" fill="#484f58" font-size="8" text-anchor="middle">hook</text>

  <!-- Jack box -->
  <rect x="186" y="40" width="130" height="52" rx="6" fill="#0a2d1f" stroke="#3fb950" stroke-width="1.5"/>
  <text x="251" y="57" fill="#3fb950" font-size="11" font-weight="bold" text-anchor="middle">punkgo-jack</text>
  <text x="251" y="72" fill="#6e7681" font-size="8" text-anchor="middle">ingest · anchor</text>
  <text x="251" y="83" fill="#6e7681" font-size="8" text-anchor="middle">verify · receipt</text>

  <!-- Arrow: jack → kernel -->
  <line x1="316" y1="66" x2="362" y2="66" stroke="#d29922" stroke-width="1.5" marker-end="url(#aa)"/>
  <text x="339" y="58" fill="#484f58" font-size="8" text-anchor="middle">IPC</text>

  <!-- Kernel box -->
  <rect x="362" y="40" width="140" height="52" rx="6" fill="#1a1500" stroke="#d29922" stroke-width="1.5"/>
  <text x="432" y="57" fill="#d29922" font-size="11" font-weight="bold" text-anchor="middle">punkgo-kernel</text>
  <text x="432" y="72" fill="#6e7681" font-size="8" text-anchor="middle">7-step pipeline</text>
  <text x="432" y="83" fill="#6e7681" font-size="8" text-anchor="middle">Merkle + Ed25519</text>

  <!-- Arrow: kernel → receipt -->
  <line x1="502" y1="66" x2="540" y2="66" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Receipt box -->
  <rect x="540" y="44" width="116" height="44" rx="6" fill="#0a2d1f" stroke="#3fb950" stroke-width="2" filter="url(#glow)"/>
  <text x="598" y="63" fill="#3fb950" font-size="11" font-weight="bold" text-anchor="middle">RECEIPT</text>
  <text x="598" y="78" fill="#6e7681" font-size="8" text-anchor="middle">id · hash · proof</text>

  <!-- ═══ Row 2: Three trust layers ═══ -->

  <text x="340" y="118" fill="#8b949e" font-size="10" font-weight="bold" text-anchor="middle">THREE LAYERS OF TRUST</text>

  <!-- Layer 1: Merkle (blue) -->
  <rect x="24" y="132" width="200" height="56" rx="5" fill="#0d1520" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="44" y="152" fill="#58a6ff" font-size="10" font-weight="bold">MERKLE</text>
  <text x="44" y="166" fill="#6e7681" font-size="8">append-only ordering</text>
  <text x="44" y="178" fill="#484f58" font-size="7">"this event is in the tree"</text>

  <!-- Layer 2: Ed25519 (green) -->
  <rect x="240" y="132" width="200" height="56" rx="5" fill="#0a1f0d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="260" y="152" fill="#3fb950" font-size="10" font-weight="bold">ED25519</text>
  <text x="260" y="166" fill="#6e7681" font-size="8">identity binding</text>
  <text x="260" y="178" fill="#484f58" font-size="7">"this kernel signed it"</text>

  <!-- Layer 3: TSA (amber) -->
  <rect x="456" y="132" width="200" height="56" rx="5" fill="#1a1500" stroke="#d29922" stroke-width="1.5"/>
  <text x="476" y="152" fill="#d29922" font-size="10" font-weight="bold">RFC 3161 TSA</text>
  <text x="476" y="166" fill="#6e7681" font-size="8">time binding</text>
  <text x="476" y="178" fill="#484f58" font-size="7">"existed before time T"</text>

  <!-- ═══ Row 3: What you get ═══ -->

  <text x="340" y="216" fill="#8b949e" font-size="10" font-weight="bold" text-anchor="middle">WHAT YOU GET</text>

  <!-- Verify -->
  <rect x="24" y="230" width="196" height="48" rx="5" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="38" y="248" fill="#3fb950" font-size="10">$ punkgo-jack verify a1b2</text>
  <text x="38" y="264" fill="#6e7681" font-size="8">Merkle proof + TSA timestamp</text>

  <!-- Receipt -->
  <rect x="236" y="230" width="196" height="48" rx="5" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="250" y="248" fill="#3fb950" font-size="10">$ punkgo-jack receipt</text>
  <text x="250" y="264" fill="#6e7681" font-size="8">session summary + anchor status</text>

  <!-- History -->
  <rect x="448" y="230" width="208" height="48" rx="5" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="462" y="248" fill="#3fb950" font-size="10">$ punkgo-jack presence</text>
  <text x="462" y="264" fill="#6e7681" font-size="8">energy heatmap across agents</text>

  <!-- ═══ Bottom: supported tools + stats ═══ -->
  <line x1="24" y1="296" x2="656" y2="296" stroke="#21262d"/>

  <text x="24" y="318" fill="#484f58" font-size="9">Supported: Claude Code · Cursor · MCP server</text>
  <text x="24" y="336" fill="#484f58" font-size="9">Protocol: RFC 6962 (Merkle) · RFC 8032 (Ed25519) · RFC 3161 (TSA) · C2SP tlog-checkpoint</text>
  <text x="24" y="352" fill="#484f58" font-size="8">Kernel is a committer, not a judge. Jack is an adapter, not an agent. Together: every action gets a receipt.</text>
</svg>
